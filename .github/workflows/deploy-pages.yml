---
name: Deploy to GitHub Pages

# Builds the static site and publishes ./dist to GitHub Pages on every push to
# master. One-time setup: repo Settings → Pages → Build and deployment → Source
# = "GitHub Actions".

on:
  push:
    branches: [master]
  workflow_dispatch:

# Permissions the deploy-pages action needs to publish via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      # Gate the deploy on the same checks CI runs, so master never ships red.
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3 # tag: official Pages action
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4 # tag: official Pages action
